function getToken() { return localStorage.getItem(TOKEN_KEY); }
function saveToken(t) { localStorage.setItem(TOKEN_KEY, t); }

async function notionGet(path) {
  var token = getToken();
  var res = await fetch('https://gomma.reensrisuplee.workers.dev/v1/' + path, {
    headers: { 'Authorization': 'Bearer ' + token, 'Notion-Version': '2022-06-28' }
  });
  if (!res.ok) throw new Error('Notion API error: ' + res.status);
  return res.json();
}

async function fetchPageData(pageId) {
  var data = await notionGet('pages/' + pageId);
  return data;
}

function extractTaskCounts(tasks) {
  var counts = { total: tasks.length, done: 0, inprog: 0, review: 0, backlog: 0 };
  tasks.forEach(function(t) {
    var s = (t.properties && t.properties.Status && t.properties.Status.status) ? t.properties.Status.status.name : '';
    if (s === 'Completed' || s === 'Archived') counts.done++;
    else if (s === 'In Progress') counts.inprog++;
    else if (s === 'Review') counts.review++;
    else counts.backlog++;
  });
  return counts;
}

async function fetchOKRData(pid) {
  var proj = PROJECTS[pid];
  var QUARTERLY_DB = '2f67286d055f80c0a29cf989583a20f3';
  try {
    var cleanId = proj.notionId.replace(/-/g, '');
    var res = await fetch('/v1/databases/' + QUARTERLY_DB + '/query', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json', 'Notion-Version': '2022-06-28' },
      body: JSON.stringify({
        filter: { property: 'Master Project Dashboard', relation: { contains: cleanId } },
        sorts: [{ property: 'Quarter', direction: 'descending' }],
        page_size: 10
      })
    });
    var data = await res.json();
    if (!data.results || data.results.length === 0) return [];

    var okrs = [];
    for (var i = 0; i < Math.min(data.results.length, 3); i++) {
      var page = data.results[i];
      var props = page.properties || {};
      var quarter = props.Quarter && props.Quarter.select ? props.Quarter.select.name : '';
      var name = props.Name && props.Name.title ? props.Name.title.map(function(r){ return r.plain_text; }).join('') : '';

      var pageRes = await fetch('/v1/blocks/' + page.id.replace(/-/g,'') + '/children', {
        headers: { 'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json', 'Notion-Version': '2022-06-28' }
      });
      var pageData = await pageRes.json();
      var goals = [];
      if (pageData.results) {
        pageData.results.forEach(function(block) {
          var type = block.type;
          if (type === 'numbered_list_item' || type === 'bulleted_list_item') {
            var rich = block[type] && block[type].rich_text ? block[type].rich_text : [];
            var text = rich.map(function(r){ return r.plain_text; }).join('');
            if (text) goals.push({ text: text, checked: false });
          } else if (type === 'to_do') {
            var rich = block.to_do && block.to_do.rich_text ? block.to_do.rich_text : [];
            var text = rich.map(function(r){ return r.plain_text; }).join('');
            if (text) goals.push({ text: text, checked: block.to_do.checked || false });
          }
        });
      }
      if (goals.length > 0) okrs.push({ quarter: quarter, name: name, goals: goals });
    }
    return okrs;
  } catch(e) {
    console.error('OKR fetch error:', e);
    return [];
  }
}

async function fetchFinanceData(pid) {
  var proj = PROJECTS[pid];
  var FINANCE_DB = '2fc7286d055f812d85b6fc8a4ca87d4d';
  try {
    var spend = 0, revenue = 0, investment = 0, loan = 0, reimb = 0;
    var monthly = {};
    var txnList = [];
    var hasMore = true;
    var cursor = null;

    while (hasMore) {
      var cleanId = proj.notionId.replace(/-/g, '');
      var body = {
        filter: {
          property: 'Master Project Dashboard',
          relation: { contains: cleanId }
        },
        page_size: 50
      };
      if (cursor) body.start_cursor = cursor;

      var res = await fetch('/v1/databases/' + FINANCE_DB + '/query', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + getToken(),
          'Content-Type': 'application/json',
          'Notion-Version': '2022-06-28'
        },
        body: JSON.stringify(body)
      });
      var data = await res.json();
      if (!data.results) break;

      data.results.forEach(function(t) {
        var p = t.properties || {};
        var amount = p.Amount && p.Amount.number ? p.Amount.number : 0;
        var type = p.Type && p.Type.select ? p.Type.select.name : '';
        var status = p.Status && p.Status.status ? p.Status.status.name : '';
        var name = p.Transaction && p.Transaction.title ? p.Transaction.title.map(function(r){ return r.plain_text; }).join('') : 'Untitled';
        var dateVal = (p['Date'] && p['Date'].date ? p['Date'].date.start : '');
        var cat = p.Category && p.Category.select ? p.Category.select.name : '';

        if (type === 'Expense') spend += amount;
        else if (type === 'Revenue') revenue += amount;
        else if (type === 'Investment') investment += amount;
        else if (type === 'Loan') loan += amount;
        if (status === 'Awaiting Reimbursement') reimb += amount;

        if (dateVal) {
          var month = dateVal.substring(0,7);
          if (!monthly[month]) monthly[month] = {expense:0, revenue:0};
          if (type === 'Expense') monthly[month].expense += amount;
          else if (type === 'Revenue') monthly[month].revenue += amount;
        }

        txnList.push({ n: name, amount: amount, type: type, status: status, cat: cat, date: dateVal });
      });

      hasMore = data.has_more;
      cursor = data.next_cursor;
    }

    txnList.sort(function(a,b){ return b.date > a.date ? 1 : -1; });
    return { spend: spend, revenue: revenue, investment: investment, loan: loan, reimb: reimb, txns: txnList, monthly: monthly };
  } catch(e) {
    console.error('Finance fetch error:', e);
    return { spend:0, revenue:0, investment:0, loan:0, reimb:0, txns:[], monthly:{} };
  }
}

async function fetchProjectLiveData(pid) {
  var proj = PROJECTS[pid];
  var TASKS_DB = '2fc7286d055f816abd4fe98440f1ed86';
  try {
    var page = await notionGet('pages/' + proj.notionId);
    var props = page.properties || {};
    var docCount = (props['Document Hub'] && props['Document Hub'].relation) ? props['Document Hub'].relation.length : 0;
    var crmCount = (props['Master CRM'] && props['Master CRM'].relation) ? props['Master CRM'].relation.length : 0;

    var cleanId = proj.notionId.replace(/-/g, '');
    var tasks = [];
    var hasMore = true;
    var cursor = null;
    while (hasMore) {
      var body = {
        filter: { property: 'Parent Project', relation: { contains: cleanId } },
        page_size: 100
      };
      if (cursor) body.start_cursor = cursor;
      var res = await fetch('/v1/databases/' + TASKS_DB + '/query', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json', 'Notion-Version': '2022-06-28' },
        body: JSON.stringify(body)
      });
      var data = await res.json();
      if (!data.results) break;
      tasks = tasks.concat(data.results);
      hasMore = data.has_more;
      cursor = data.next_cursor;
    }

    var taskCounts = extractTaskCounts(tasks);

    var activeTasks = tasks.filter(function(t) {
      var s = t.properties && t.properties.Status && t.properties.Status.status ? t.properties.Status.status.name : '';
      return s === 'In Progress' || s === 'Review';
    }).slice(0, 8).map(function(t) {
      var name = t.properties && t.properties.Task && t.properties.Task.title ? t.properties.Task.title.map(function(r){ return r.plain_text; }).join('') : 'Untitled';
      var status = t.properties && t.properties.Status && t.properties.Status.status ? t.properties.Status.status.name : '';
      var due = t.properties && t.properties['Due Date'] && t.properties['Due Date'].date ? t.properties['Due Date'].date.start : '—';
      return { n: name, s: status, sc: status === 'In Progress' ? 'p-b' : 'p-y', due: due };
    });

    var finance = await fetchFinanceData(pid);
    var okrs = await fetchOKRData(pid);

    liveData[pid] = { taskCounts: taskCounts, activeTasks: activeTasks, docs: docCount, crm: crmCount, finance: finance, okrs: okrs, lastRefresh: new Date() };
  } catch(e) {
    console.error('Error fetching live data:', e);
    liveData[pid] = null;
  }
}

function pill(text, cls) { return '<span class="pill ' + cls + '">' + text + '</span>'; }

function buildCharts(pid) {
  var s = STATIC[pid];
  var live = liveData[pid];
  Object.values(charts).forEach(function(c){ try{ c.destroy(); }catch(e){} });
  charts = {};

  var bc = document.getElementById('burnChart');
  if (bc) {
    charts.burn = new Chart(bc, {
      type: 'bar',
      data: {
        labels: s.monthly.map(function(m){ return m.m; }),
        datasets: [{ data: s.monthly.map(function(m){ return m.v; }), backgroundColor: s.revenue > 0 ? '#639922' : '#E24B4A', borderRadius: 4, borderWidth: 0 }]
      },
      options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return ' ฿'+c.parsed.y.toLocaleString();}}}}, scales:{x:{grid:{display:false},ticks:{font:{size:11}}},y:{grid:{color:'rgba(128,128,128,.1)'},ticks:{font:{size:11},callback:function(v){return '฿'+v.toLocaleString();}}}}}
    });
  }

  var tc = document.getElementById('taskChart');
  if (tc) {
    var t = live ? live.taskCounts : { done:0, inprog:0, review:0, backlog:0 };
    charts.task = new Chart(tc, {
      type: 'doughnut',
      data: { datasets:[{ data:[t.done,t.inprog,t.review,t.backlog], backgroundColor:['#639922','#378ADD','#EF9F27','#7F77DD'], borderWidth:0, hoverOffset:3 }] },
      options: { responsive:true, maintainAspectRatio:false, cutout:'65%', plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){ return [' Done',' In Progress',' Review',' Backlog'][c.dataIndex]+': '+c.parsed; }}}}}
    });
  }
}

function switchTab(name) {
  activeTab = name;
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('active'); });
  event.target.classList.add('active');
  var panel = document.getElementById('panel-' + name);
  if (panel) panel.classList.add('active');
  setTimeout(function(){ buildCharts(activeProject); }, 50);
}

function loadProject(pid) {
  activeProject = pid;
  document.querySelectorAll('.project-btn').forEach(function(b){ b.classList.remove('active'); });
  document.querySelector('[data-pid="' + pid + '"]').classList.add('active');
  renderDashboard(pid);
}

async function refreshCurrent() {
  var btn = document.getElementById('refresh-btn');
  btn.classList.add('loading');
  btn.querySelector('.btn-label').textContent = 'Refreshing...';
  try {
    await fetchProjectLiveData(activeProject);
    renderDashboard(activeProject);
    setStatus('Last refreshed: ' + new Date().toLocaleTimeString());
  } catch(e) {
    setStatus('Error refreshing — check your Notion token.');
  }
  btn.classList.remove('loading');
  btn.querySelector('.btn-label').textContent = 'Refresh';
}

function setStatus(msg) {
  var el = document.getElementById('status-bar');
  if (el) el.textContent = msg;
}

function renderTokenForm(errorMsg) {
  var html = '<div class="token-form">';
  html += '<h2>Connect to Notion</h2>';
  html += '<p>Enter your Notion integration token to load live data from your workspace.</p>';
  if (errorMsg) html += '<div class="error-msg">' + errorMsg + '</div>';
  html += '<input class="token-input" id="token-input" type="password" placeholder="ntn_xxxxxxxxxxxx or secret_xxxxxxxxxxxx" />';
  html += '<button class="save-btn" onclick="submitToken()">Connect</button>';
  html += '<p class="token-note">Your token is stored locally in your browser and never sent anywhere except directly to Notion\'s API. Create an integration at notion.so/my-integrations and share your workspace pages with it.</p>';
  html += '</div>';
  document.getElementById('root').innerHTML = html;
}

function submitToken() {
  var val = document.getElementById('token-input').value.trim();
  if (!val || (!val.startsWith('secret_') && !val.startsWith('ntn_'))) {
    renderTokenForm('Token must start with secret_ or ntn_ — paste it carefully, no extra spaces');
    return;
  }
  saveToken(val);
  init();
}

function renderShell() {
  var html = '<div class="topbar">';
  html += '<div class="topbar-left">';
  html += '<span class="logo">BI Dashboard <span>· Workspace</span></span>';
  html += '<div class="project-bar">';
  Object.keys(PROJECTS).forEach(function(pid){
    html += '<button class="project-btn' + (pid===activeProject?' active':'') + '" data-pid="' + pid + '" onclick="loadProject(\'' + pid + '\')">' + PROJECTS[pid].name + '</button>';
  });
  html += '</div></div>';
  html += '<button class="refresh-btn" id="refresh-btn" onclick="refreshCurrent()"><div class="spinner"></div><span class="btn-label">Refresh</span></button>';
  html += '</div>';
  html += '<div class="status-bar" id="status-bar">Click Refresh to load live data from Notion.</div>';
  html += '<div id="dashboard-area"></div>';
  document.getElementById('root').innerHTML = html;
  renderDashboard(activeProject);
}

async function init() {
  var token = getToken();
  if (!token) { renderTokenForm(); return; }

  document.getElementById('root').innerHTML = '<div class="loading-screen"><div class="big-spinner"></div><p>Connecting to Notion...</p></div>';

  try {
    await notionGet('users/me');
  } catch(e) {
    localStorage.removeItem(TOKEN_KEY);
    renderTokenForm('Could not connect — token may be invalid or expired.');
    return;
  }

  renderShell();
}

init();
